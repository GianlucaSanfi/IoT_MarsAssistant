# =============================================================================
# docker-compose.yml
#
# Servizi:
#   rabbitmq          — broker AMQP + Management UI (porta 15672)
#   sensor_poller     — polling REST periodico dei sensori
#   telemetry_listener — ascolto parallelo dei topic SSE
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # RabbitMQ
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"       # AMQP — broker
      - "15672:15672"     # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Sensor Poller
  # ---------------------------------------------------------------------------
  sensor_poller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sensor_poller
    restart: unless-stopped
    command: ["python", "sensor_poller.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # --- API ---
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8080}

      # --- Polling ---
      SENSOR_POLL_INTERVAL_SEC: ${SENSOR_POLL_INTERVAL_SEC:-10}
      SENSOR_POLL_TIMEOUT_SEC:  ${SENSOR_POLL_TIMEOUT_SEC:-5}

      # --- Publisher ---
      PUBLISHER_TYPE: rabbitmq

      # --- RabbitMQ ---
      RABBITMQ_HOST:     rabbitmq          # nome del servizio Docker
      RABBITMQ_PORT:     5672
      RABBITMQ_USER:     ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST:    ${RABBITMQ_VHOST:-/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-telemetry}
      RABBITMQ_SENSOR_ROUTING_KEY: ${RABBITMQ_SENSOR_ROUTING_KEY:-sensors.normalized}

      # Retry all'avvio (buffer extra oltre l'healthcheck)
      RABBITMQ_STARTUP_RETRY_DELAY_SEC: 3
      RABBITMQ_STARTUP_MAX_RETRIES:     20

  # ---------------------------------------------------------------------------
  # Telemetry Listener
  # ---------------------------------------------------------------------------
  telemetry_listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telemetry_listener
    restart: unless-stopped
    command: ["python", "telemetry_listener.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # --- API ---
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8080}

      # --- SSE ---
      TELEMETRY_RECONNECT_DELAY_SEC: ${TELEMETRY_RECONNECT_DELAY_SEC:-5}
      TELEMETRY_STREAM_TIMEOUT_SEC:  ${TELEMETRY_STREAM_TIMEOUT_SEC:-30}

      # --- Publisher ---
      PUBLISHER_TYPE: rabbitmq

      # --- RabbitMQ ---
      RABBITMQ_HOST:     rabbitmq
      RABBITMQ_PORT:     5672
      RABBITMQ_USER:     ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST:    ${RABBITMQ_VHOST:-/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-telemetry}
      RABBITMQ_TELEMETRY_ROUTING_KEY: ${RABBITMQ_TELEMETRY_ROUTING_KEY:-telemetry.normalized}

      RABBITMQ_STARTUP_RETRY_DELAY_SEC: 3
      RABBITMQ_STARTUP_MAX_RETRIES:     20

# ---------------------------------------------------------------------------
# Volumi
# ---------------------------------------------------------------------------
volumes:
  rabbitmq_data:
    driver: local
