<!DOCTYPE html>
<html>

<head>

<title>IoT Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
text-align:center;
}

.sensor-value{
font-size:40px;
margin-top:10px;
color:#38bdf8;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

button{
background:#38bdf8;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

input{
padding:6px;
margin-right:5px;
border-radius:4px;
border:none;
}

</style>

</head>

<body>

<h1>IoT Dashboard</h1>

<h2>Live Sensors</h2>

<div class="grid" id="sensorGrid"></div>


<h2>Create Rule</h2>

<div>

<input id="sensor" placeholder="sensor">
<input id="operator" placeholder="operator">
<input id="threshold" placeholder="value">
<input id="actuator" placeholder="actuator">
<input id="action" placeholder="action">

<button onclick="createRule()">Create</button>

</div>

<h2>Rules</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Sensor</th>
<th>Operator</th>
<th>Value</th>
<th>Actuator</th>
<th>Action</th>
<th></th>
</tr>

</thead>

<tbody id="rulesTable"></tbody>

</table>

<script src="/static/dashboard.js"></script>

</body>
</html>
